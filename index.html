<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>datagrape — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- REPO_DATA_INJECT -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --bg2: #111118; --bg3: #17171f;
      --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.15);
      --text: #f0ede8; --muted: #7a7888;
      --accent: #c8b8ff; --accent2: #7cffd4; --accent3: #ffb347;
      --tag-bg: rgba(200,184,255,0.08); --tag-border: rgba(200,184,255,0.18);
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Sora', sans-serif; font-weight: 300;
      line-height: 1.7; min-height: 100vh; overflow-x: hidden;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(200,184,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(200,184,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events: none; z-index: 0;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; position: relative; z-index: 1; }

    /* HEADER */
    header { padding: 5rem 0 4rem; position: relative; }
    .glow-orb {
      position: absolute; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(200,184,255,0.06) 0%, transparent 70%);
      top: -100px; right: -100px; pointer-events: none;
    }
    .avatar {
      width: 64px; height: 64px; border-radius: 50%;
      border: 2px solid var(--border-hover); margin-bottom: 1.5rem;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--tag-bg); border: 1px solid var(--tag-border);
      border-radius: 100px; padding: 4px 14px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--accent); letter-spacing: 0.08em; margin-bottom: 1.5rem;
    }
    .badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent2); animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
    h1 {
      font-family: 'DM Serif Display', serif; font-size: clamp(3rem,8vw,6rem);
      font-weight: 400; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 1.25rem;
    }
    h1 em { font-style: italic; color: var(--accent); }
    .tagline { font-size: 1.1rem; color: var(--muted); max-width: 480px; margin-bottom: 2.5rem; line-height: 1.8; }
    .social-links { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 8px;
      font-family: 'DM Mono', monospace; font-size: 12px;
      text-decoration: none; letter-spacing: 0.05em;
      transition: all 0.2s ease; cursor: pointer; border: none;
    }
    .btn-primary { background: var(--accent); color: #0a0a0f; font-weight: 500; }
    .btn-primary:hover { background: #d9ccff; transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }

    /* STATS */
    .stats-bar {
      display: flex; gap: 2.5rem; padding: 2rem 0;
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
      margin: 3rem 0; flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-num { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--text); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }

    /* FILTERS */
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .section-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; font-weight: 400; }
    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 14px; border-radius: 100px; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 11px;
      cursor: pointer; transition: all 0.15s ease; letter-spacing: 0.04em;
    }
    .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--tag-bg); }

    /* TOGGLE */
    .visibility-toggle { display: flex; gap: 0.5rem; align-items: center; }
    .toggle-btn {
      padding: 5px 14px; border-radius: 100px; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 11px;
      cursor: pointer; transition: all 0.15s ease; letter-spacing: 0.04em;
    }
    .toggle-btn.active { border-color: var(--accent3); color: var(--accent3); background: rgba(255,179,71,0.08); }

    /* GRID */
    .projects-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; margin-bottom: 4rem;
    }
    .project-card {
      background: var(--bg); padding: 1.75rem;
      display: flex; flex-direction: column; gap: 0.75rem;
      transition: background 0.2s ease; text-decoration: none;
      color: inherit; position: relative; overflow: hidden;
    }
    .project-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(200,184,255,0.04) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.3s ease;
    }
    .project-card:hover::before { opacity: 1; }
    .project-card:hover { background: var(--bg3); }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
    .card-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--tag-bg); border: 1px solid var(--tag-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .card-arrow { color: var(--muted); font-size: 18px; transition: transform 0.2s ease, color 0.2s ease; line-height: 1; }
    .project-card:hover .card-arrow { transform: translate(3px,-3px); color: var(--accent); }
    .card-name { font-size: 1rem; font-weight: 500; color: var(--text); line-height: 1.3; margin-top: 0.5rem; }
    .card-desc { font-size: 0.875rem; color: var(--muted); line-height: 1.6; flex: 1; }
    .card-footer {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      padding-top: 0.75rem; border-top: 1px solid var(--border); margin-top: auto;
    }
    .lang-dot { display: inline-flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .stat-pill { display: inline-flex; align-items: center; gap: 4px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .card-tag {
      font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 8px;
      border-radius: 4px; background: var(--tag-bg); border: 1px solid var(--tag-border);
      color: var(--accent); letter-spacing: 0.04em;
    }
    .card-tag.private-tag {
      background: rgba(255,179,71,0.08); border-color: rgba(255,179,71,0.2); color: var(--accent3);
    }

    /* LANG COLORS */
    .lang-JavaScript{background:#f7df1e} .lang-TypeScript{background:#3178c6}
    .lang-Python{background:#3572a5} .lang-Rust{background:#dea584}
    .lang-Go{background:#00add8} .lang-Java{background:#b07219}
    .lang-CSS{background:#563d7c} .lang-HTML{background:#e34c26}
    .lang-Vue{background:#41b883} .lang-Ruby{background:#701516}
    .lang-Swift{background:#f05138} .lang-Kotlin{background:#a97bff}
    .lang-Shell{background:#89e051} .lang-C{background:#555555}
    .lang-Cpp{background:#f34b7d} .lang-PHP{background:#4f5d95}
    .lang-Dart{background:#00b4ab} .lang-default{background:#8b8b8b}

    /* ERROR */
    .error-box {
      background: rgba(255,80,80,0.06); border: 1px solid rgba(255,80,80,0.15);
      border-radius: 12px; padding: 2rem; text-align: center;
      color: var(--muted); font-family: 'DM Mono', monospace; font-size: 13px;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border); padding: 2rem 0;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }
    .footer-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.04em; }
    .footer-text a { color: var(--accent); text-decoration: none; }

    @media(max-width:600px){
      header{padding:3rem 0 2rem}
      .stats-bar{gap:1.5rem}
      .projects-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="glow-orb"></div>
    <img class="avatar" id="avatar" src="" alt="datagrape avatar" style="display:none" />
    <div class="badge">open to work</div>
    <h1>data<em>grape</em></h1>
    <p class="tagline" id="bio">Building things that matter — open source projects, experiments, and tools.</p>
    <div class="social-links">
      <a href="https://github.com/datagrape" target="_blank" rel="noopener" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub
      </a>
      <a href="https://github.com/datagrape?tab=repositories" target="_blank" rel="noopener" class="btn btn-ghost">All Repos →</a>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="stat-repos">—</span><span class="stat-label">Repositories</span></div>
    <div class="stat"><span class="stat-num" id="stat-public">—</span><span class="stat-label">Public</span></div>
    <div class="stat"><span class="stat-num" id="stat-private">—</span><span class="stat-label">Private</span></div>
    <div class="stat"><span class="stat-num" id="stat-stars">—</span><span class="stat-label">Total Stars</span></div>
    <div class="stat"><span class="stat-num" id="stat-langs">—</span><span class="stat-label">Languages</span></div>
  </div>

  <div class="section-head">
    <h2 class="section-title">Projects</h2>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center">
      <div class="visibility-toggle">
        <button class="toggle-btn active" id="toggle-all" onclick="setVisibility('all')">All</button>
        <button class="toggle-btn" id="toggle-public" onclick="setVisibility('public')">Public</button>
        <button class="toggle-btn" id="toggle-private" onclick="setVisibility('private')">Private 🔒</button>
      </div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-lang="all">All langs</button>
      </div>
    </div>
  </div>

  <div id="projects-container">
    <div class="projects-grid" id="projects-grid"></div>
  </div>

  <footer>
    <span class="footer-text">
      built with <a href="https://pages.github.com" target="_blank">github pages</a> · private repos included via <a href="https://github.com/features/actions" target="_blank">github actions</a>
    </span>
    <span class="footer-text" id="last-updated"></span>
  </footer>

</div>

<script>
const LANG_ICONS = {
  JavaScript:'☕',TypeScript:'🔷',Python:'🐍',Rust:'⚙️',
  Go:'🐹',Java:'☕',CSS:'🎨',HTML:'🌐',Vue:'💚',
  Ruby:'💎',Swift:'🦅',Kotlin:'🔶',Shell:'🐚',
  C:'⚡','C++':'⚡',PHP:'🐘',Dart:'🎯',
};

function getLangClass(lang){
  if(!lang) return 'lang-default';
  return 'lang-'+(lang.replace(/[^a-zA-Z]/g,'')||'default');
}

function timeAgo(dateStr){
  const s = Math.floor((Date.now()-new Date(dateStr))/1000);
  if(s<60) return 'just now';
  if(s<3600) return `${Math.floor(s/60)}m ago`;
  if(s<86400) return `${Math.floor(s/3600)}h ago`;
  if(s<2592000) return `${Math.floor(s/86400)}d ago`;
  if(s<31536000) return `${Math.floor(s/2592000)}mo ago`;
  return `${Math.floor(s/31536000)}y ago`;
}

function renderCard(repo){
  const lang = repo.language||'';
  const icon = LANG_ICONS[lang]||'📦';
  const desc = repo.description||'No description provided.';
  const visClass = repo.private ? 'private-repo' : 'public-repo';
  return `
    <a class="project-card ${visClass}" href="${repo.html_url}" target="_blank" rel="noopener" data-lang="${lang}">
      <div class="card-top">
        <div class="card-icon">${icon}</div>
        <span class="card-arrow">↗</span>
      </div>
      <div class="card-name">${repo.name}</div>
      <div class="card-desc">${desc}</div>
      <div class="card-footer">
        ${lang?`<span class="lang-dot"><span class="dot ${getLangClass(lang)}"></span>${lang}</span>`:''}
        ${repo.stargazers_count>0?`<span class="stat-pill">★ ${repo.stargazers_count}</span>`:''}
        ${repo.forks_count>0?`<span class="stat-pill">⑂ ${repo.forks_count}</span>`:''}
        ${repo.private?`<span class="card-tag private-tag">🔒 private</span>`:''}
        ${repo.fork?`<span class="card-tag">forked</span>`:''}
        <span class="stat-pill" style="margin-left:auto">${timeAgo(repo.updated_at)}</span>
      </div>
    </a>`;
}

let currentVisibility = 'all';
let currentLang = 'all';

function applyFilters(){
  document.querySelectorAll('.project-card').forEach(card => {
    const langMatch = currentLang==='all' || card.dataset.lang===currentLang;
    const visMatch = currentVisibility==='all'
      || (currentVisibility==='private' && card.classList.contains('private-repo'))
      || (currentVisibility==='public' && card.classList.contains('public-repo'));
    card.style.display = (langMatch && visMatch) ? '' : 'none';
  });
}

function setVisibility(v){
  currentVisibility = v;
  ['all','public','private'].forEach(k=>{
    document.getElementById('toggle-'+k).classList.toggle('active', k===v);
  });
  applyFilters();
}

function buildFilters(repos){
  const langs = [...new Set(repos.map(r=>r.language).filter(Boolean))].sort();
  const fc = document.getElementById('filters');
  langs.forEach(lang=>{
    const btn = document.createElement('button');
    btn.className='filter-btn'; btn.dataset.lang=lang; btn.textContent=lang;
    fc.appendChild(btn);
  });
  fc.addEventListener('click', e=>{
    if(!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
    currentLang = e.target.dataset.lang;
    applyFilters();
  });
}

function init(){
  const el = document.getElementById('repo-data');
  if(!el){
    document.getElementById('projects-grid').innerHTML=`
      <div class="error-box" style="grid-column:1/-1">
        <p>⚠ No repo data found.</p>
        <p style="margin-top:0.5rem;font-size:12px">Run the GitHub Actions workflow to build the portfolio with your private repos.</p>
      </div>`;
    return;
  }

  const payload = JSON.parse(el.textContent);
  const { repos, stats, user, built_at } = payload;

  // Avatar + bio
  if(user.avatar_url){
    const av = document.getElementById('avatar');
    av.src = user.avatar_url; av.style.display='block';
  }
  if(user.bio) document.getElementById('bio').textContent = user.bio;

  // Stats
  document.getElementById('stat-repos').textContent = stats.total;
  document.getElementById('stat-public').textContent = stats.public;
  document.getElementById('stat-private').textContent = stats.private;
  document.getElementById('stat-stars').textContent = stats.stars;
  document.getElementById('stat-langs').textContent = stats.languages;

  // Cards
  document.getElementById('projects-grid').innerHTML = repos.map(renderCard).join('');

  // Filters
  buildFilters(repos);

  // Built at
  const d = new Date(built_at);
  document.getElementById('last-updated').textContent =
    `built ${d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} ${d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;
}

init();
</script>
</body>
</html>
