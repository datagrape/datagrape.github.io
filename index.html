<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>datagrape — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #17171f;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --text: #f0ede8;
      --muted: #7a7888;
      --accent: #c8b8ff;
      --accent2: #7cffd4;
      --accent3: #ffb347;
      --tag-bg: rgba(200,184,255,0.08);
      --tag-border: rgba(200,184,255,0.18);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === NOISE TEXTURE === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* === GRID BG === */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,184,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,184,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 1;
    }

    /* === HEADER === */
    header {
      padding: 5rem 0 4rem;
      position: relative;
    }

    .glow-orb {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,184,255,0.06) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      border-radius: 100px;
      padding: 4px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .tagline {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 480px;
      margin-bottom: 2.5rem;
      line-height: 1.8;
    }

    .social-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      font-weight: 500;
    }

    .btn-primary:hover {
      background: #d9ccff;
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }

    /* === STATS BAR === */
    .stats-bar {
      display: flex;
      gap: 2.5rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin: 3rem 0;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--text);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* === FILTER BAR === */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      font-weight: 400;
    }

    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.04em;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--tag-bg);
    }

    /* === PROJECT GRID === */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 4rem;
    }

    .project-card {
      background: var(--bg);
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: background 0.2s ease;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }

    .project-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(200,184,255,0.04) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .project-card:hover::before { opacity: 1; }
    .project-card:hover { background: var(--bg3); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .card-arrow {
      color: var(--muted);
      font-size: 18px;
      transition: transform 0.2s ease, color 0.2s ease;
      line-height: 1;
    }

    .project-card:hover .card-arrow {
      transform: translate(3px, -3px);
      color: var(--accent);
    }

    .card-name {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
      margin-top: 0.5rem;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .lang-dot {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .card-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    /* === LANGUAGE COLORS === */
    .lang-JavaScript { background: #f7df1e; }
    .lang-TypeScript { background: #3178c6; }
    .lang-Python { background: #3572a5; }
    .lang-Rust { background: #dea584; }
    .lang-Go { background: #00add8; }
    .lang-Java { background: #b07219; }
    .lang-CSS { background: #563d7c; }
    .lang-HTML { background: #e34c26; }
    .lang-Vue { background: #41b883; }
    .lang-Ruby { background: #701516; }
    .lang-Swift { background: #f05138; }
    .lang-Kotlin { background: #a97bff; }
    .lang-Shell { background: #89e051; }
    .lang-C { background: #555555; }
    .lang-Cpp { background: #f34b7d; }
    .lang-PHP { background: #4f5d95; }
    .lang-Dart { background: #00b4ab; }
    .lang-default { background: #8b8b8b; }

    /* === LOADING & EMPTY === */
    .loading-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 4rem;
    }

    .skeleton {
      background: var(--bg);
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .skel {
      background: var(--bg3);
      border-radius: 4px;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    .error-box {
      background: rgba(255,80,80,0.06);
      border: 1px solid rgba(255,80,80,0.15);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }

    /* === FOOTER === */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-text {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 600px) {
      header { padding: 3rem 0 2rem; }
      .stats-bar { gap: 1.5rem; }
      .projects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="glow-orb"></div>
    <div class="badge">available for work</div>
    <h1>data<em>grape</em></h1>
    <p class="tagline">Building things that matter — open source projects, experiments, and tools.</p>
    <div class="social-links">
      <a href="https://github.com/datagrape" target="_blank" rel="noopener" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub
      </a>
      <a href="https://github.com/datagrape?tab=repositories" target="_blank" rel="noopener" class="btn btn-ghost">All Repos →</a>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat">
      <span class="stat-num" id="stat-repos">—</span>
      <span class="stat-label">Repositories</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-stars">—</span>
      <span class="stat-label">Total Stars</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-langs">—</span>
      <span class="stat-label">Languages</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-forks">—</span>
      <span class="stat-label">Total Forks</span>
    </div>
  </div>

  <!-- PROJECTS SECTION -->
  <div class="section-head">
    <h2 class="section-title">Projects</h2>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-lang="all">All</button>
    </div>
  </div>

  <div id="projects-container">
    <!-- Skeleton loaders -->
    <div class="loading-grid" id="skeleton">
      ${Array(6).fill('').map(() => `
        <div class="skeleton">
          <div class="skel" style="width:36px;height:36px;border-radius:8px;"></div>
          <div class="skel" style="height:16px;width:60%;margin-top:8px;"></div>
          <div class="skel" style="height:12px;width:90%;"></div>
          <div class="skel" style="height:12px;width:75%;"></div>
          <div style="display:flex;gap:8px;margin-top:8px;">
            <div class="skel" style="height:10px;width:40px;"></div>
            <div class="skel" style="height:10px;width:30px;"></div>
          </div>
        </div>
      `).join('')}
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <span class="footer-text">
      built with <a href="https://pages.github.com" target="_blank">github pages</a> · auto-synced via github actions
    </span>
    <span class="footer-text" id="last-updated"></span>
  </footer>

</div>

<script>
const USERNAME = 'datagrape';
const GITHUB_API = `https://api.github.com/users/${USERNAME}/repos?sort=updated&per_page=100&type=public`;

const LANG_ICONS = {
  JavaScript: '☕', TypeScript: '🔷', Python: '🐍', Rust: '⚙️',
  Go: '🐹', Java: '☕', CSS: '🎨', HTML: '🌐', Vue: '💚',
  Ruby: '💎', Swift: '🦅', Kotlin: '🔶', Shell: '🐚',
  C: '⚡', 'C++': '⚡', PHP: '🐘', Dart: '🎯',
};

function getLangClass(lang) {
  if (!lang) return 'lang-default';
  return 'lang-' + lang.replace(/[^a-zA-Z]/g, '') || 'lang-default';
}

function timeAgo(dateStr) {
  const seconds = Math.floor((Date.now() - new Date(dateStr)) / 1000);
  if (seconds < 60) return 'just now';
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
  if (seconds < 2592000) return `${Math.floor(seconds / 86400)}d ago`;
  if (seconds < 31536000) return `${Math.floor(seconds / 2592000)}mo ago`;
  return `${Math.floor(seconds / 31536000)}y ago`;
}

function renderCard(repo) {
  const lang = repo.language || '';
  const icon = LANG_ICONS[lang] || '📦';
  const desc = repo.description || 'No description provided.';
  const isForked = repo.fork;

  return `
    <a class="project-card" href="${repo.html_url}" target="_blank" rel="noopener" data-lang="${lang}">
      <div class="card-top">
        <div class="card-icon">${icon}</div>
        <span class="card-arrow">↗</span>
      </div>
      <div class="card-name">${repo.name}</div>
      <div class="card-desc">${desc}</div>
      <div class="card-footer">
        ${lang ? `<span class="lang-dot"><span class="dot ${getLangClass(lang)}"></span>${lang}</span>` : ''}
        ${repo.stargazers_count > 0 ? `<span class="stat-pill">★ ${repo.stargazers_count}</span>` : ''}
        ${repo.forks_count > 0 ? `<span class="stat-pill">⑂ ${repo.forks_count}</span>` : ''}
        ${isForked ? `<span class="card-tag">forked</span>` : ''}
        <span class="stat-pill" style="margin-left:auto">${timeAgo(repo.updated_at)}</span>
      </div>
    </a>
  `;
}

function updateStats(repos) {
  const totalStars = repos.reduce((s, r) => s + r.stargazers_count, 0);
  const totalForks = repos.reduce((s, r) => s + r.forks_count, 0);
  const langs = new Set(repos.map(r => r.language).filter(Boolean));

  document.getElementById('stat-repos').textContent = repos.length;
  document.getElementById('stat-stars').textContent = totalStars;
  document.getElementById('stat-langs').textContent = langs.size;
  document.getElementById('stat-forks').textContent = totalForks;
}

function buildFilters(repos) {
  const langs = [...new Set(repos.map(r => r.language).filter(Boolean))].sort();
  const filterContainer = document.getElementById('filters');
  langs.forEach(lang => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.lang = lang;
    btn.textContent = lang;
    filterContainer.appendChild(btn);
  });

  filterContainer.addEventListener('click', e => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    const selected = e.target.dataset.lang;
    document.querySelectorAll('.project-card').forEach(card => {
      card.style.display = (selected === 'all' || card.dataset.lang === selected) ? '' : 'none';
    });
  });
}

async function loadRepos() {
  try {
    const res = await fetch(GITHUB_API);
    if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
    const repos = await res.json();

    const sorted = repos
      .filter(r => !r.fork || r.stargazers_count > 0)
      .sort((a, b) => b.stargazers_count - a.stargazers_count || new Date(b.updated_at) - new Date(a.updated_at));

    document.getElementById('skeleton').remove();

    const grid = document.createElement('div');
    grid.className = 'projects-grid';
    grid.id = 'projects-grid';
    grid.innerHTML = sorted.map(renderCard).join('');
    document.getElementById('projects-container').appendChild(grid);

    updateStats(repos);
    buildFilters(sorted);

    const now = new Date();
    document.getElementById('last-updated').textContent =
      `last fetched ${now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;

  } catch (err) {
    document.getElementById('skeleton').remove();
    document.getElementById('projects-container').innerHTML = `
      <div class="error-box">
        <p style="margin-bottom:0.5rem">⚠ Could not load repositories</p>
        <p>${err.message}</p>
        <p style="margin-top:1rem"><a href="https://github.com/${USERNAME}?tab=repositories" style="color:#c8b8ff" target="_blank">View on GitHub →</a></p>
      </div>
    `;
  }
}

loadRepos();
</script>
</body>
</html>
